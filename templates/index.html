<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 CineAI — Movie Q&A</title>
  <meta name="description" content="Ask anything about movies — directors, actors, ratings, release dates and more, powered by Neo4j graph database and NLP." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Variables ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0d14;
      --surface:   rgba(255,255,255,0.04);
      --surface2:  rgba(255,255,255,0.07);
      --border:    rgba(255,255,255,0.10);
      --accent:    #c084fc;      /* purple */
      --accent2:   #f472b6;      /* pink   */
      --accent3:   #818cf8;      /* indigo */
      --gold:      #fbbf24;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --success:   #34d399;
      --error:     #f87171;
      --radius:    16px;
      --radius-sm: 10px;
      --shadow:    0 8px 32px rgba(0,0,0,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Animated background ───────────────────────────────────────────────── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: .25;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: #7c3aed; top: -120px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #db2777; top: 60%; right: -80px; animation-delay: -6s; }
    .orb-3 { width: 300px; height: 300px; background: #4f46e5; bottom: -60px; left: 35%; animation-delay: -12s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 40px) scale(1.08); }
    }

    /* ─── Stars ─────────────────────────────────────────────────────────────── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; background: white; border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.1; } 50% { opacity: 0.7; }
    }

    /* ─── Layout ─────────────────────────────────────────────────────────────- */
    .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ─── Header ─────────────────────────────────────────────────────────────── */
    header {
      padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,13,20,0.6);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.35rem; font-weight: 700; letter-spacing: -0.5px;
    }
    .logo .icon { font-size: 1.6rem; animation: spin-slow 10s linear infinite; display: inline-block; }
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    .logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .header-status {
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; color: var(--muted);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--success);
      animation: pulse-dot 2s ease infinite;
    }
    .status-dot.error { background: var(--error); animation: none; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }

    /* ─── Main container ─────────────────────────────────────────────────────── */
    main {
      flex: 1; display: flex; flex-direction: column;
      max-width: 900px; width: 100%; margin: 0 auto;
      padding: 32px 20px 120px;
    }

    /* ─── Hero section ───────────────────────────────────────────────────────── */
    .hero {
      text-align: center; padding: 48px 20px 36px;
    }
    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.15; margin-bottom: 14px;
    }
    .hero p {
      color: var(--muted); font-size: 1.05rem; max-width: 480px; margin: 0 auto 32px;
      line-height: 1.7;
    }

    /* ─── Chips ──────────────────────────────────────────────────────────────── */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 8px; }
    .chip {
      padding: 7px 14px; border-radius: 999px; font-size: .8rem; font-weight: 500;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; transition: all .25s;
      white-space: nowrap;
    }
    .chip:hover {
      background: rgba(192,132,252,0.15);
      border-color: var(--accent); color: var(--accent);
      transform: translateY(-2px);
    }

    /* ─── Chat window ────────────────────────────────────────────────────────── */
    #chat-window {
      flex: 1;
      display: flex; flex-direction: column; gap: 18px;
      min-height: 200px;
    }

    /* welcome / empty state */
    .empty-state {
      text-align: center; padding: 40px 20px; color: var(--muted);
    }
    .empty-state .es-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: .95rem; line-height: 1.6; }

    /* message bubbles */
    .message { display: flex; gap: 12px; align-items: flex-start; animation: slideUp .35s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .message.user  { flex-direction: row-reverse; }
    .message.user  .bubble { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; border-bottom-right-radius: 4px; }
    .message.bot   .bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .message.error .bubble { background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.3); }

    .avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700;
    }
    .message.user  .avatar { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; }
    .message.bot   .avatar { background: linear-gradient(135deg, #1e1b4b, #312e81); color: var(--accent); border: 1px solid var(--border); }
    .message.error .avatar { background: rgba(248,113,113,.2); color: var(--error); }

    .bubble {
      max-width: 75%; padding: 14px 18px; border-radius: var(--radius);
      font-size: .93rem; line-height: 1.65; position: relative;
      white-space: pre-wrap; word-break: break-word;
    }
    .bubble .timestamp {
      display: block; font-size: .7rem; color: rgba(255,255,255,.4);
      margin-top: 6px; text-align: right;
    }
    .message.bot .bubble .timestamp { text-align: left; }

    /* typing indicator */
    .typing-bubble { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: bounce .7s ease infinite; }
    .dot:nth-child(2) { animation-delay: .12s; }
    .dot:nth-child(3) { animation-delay: .24s; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

    /* ─── Input area ─────────────────────────────────────────────────────────── */
    .input-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,13,20,0.85); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border); padding: 16px 20px; z-index: 40;
    }
    .input-bar-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; gap: 10px; align-items: flex-end;
    }
    .input-wrap { flex: 1; position: relative; }

    #question-input {
      width: 100%; padding: 14px 50px 14px 18px;
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: .95rem;
      outline: none; resize: none; max-height: 140px; min-height: 52px;
      transition: border-color .2s, box-shadow .2s;
      line-height: 1.5;
    }
    #question-input::placeholder { color: var(--muted); }
    #question-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192,132,252,.15);
    }

    .char-count {
      position: absolute; bottom: 10px; right: 14px;
      font-size: .7rem; color: var(--muted); pointer-events: none;
    }

    #send-btn {
      width: 52px; height: 52px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #7c3aed, #db2777);
      border: none; cursor: pointer; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; transition: all .2s; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(124,58,237,.4);
    }
    #send-btn:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 24px rgba(124,58,237,.5); }
    #send-btn:active { transform: scale(.96); }
    #send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    #clear-btn {
      width: 52px; height: 52px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
      cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all .2s; flex-shrink: 0;
    }
    #clear-btn:hover { color: var(--error); border-color: var(--error); background: rgba(248,113,113,.1); }

    /* ─── Stats ribbon ───────────────────────────────────────────────────────── */
    .stats-ribbon {
      display: flex; justify-content: center; gap: 28px; flex-wrap: wrap;
      padding: 16px 20px; margin-bottom: 8px;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat .val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .stat .lbl { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* ─── Scrollbar ──────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ─── Toast ──────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 999px; font-size: .85rem;
      opacity: 0; transition: all .3s; pointer-events: none; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── Responsive ─────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 14px 16px; }
      main { padding: 24px 12px 110px; }
      .hero { padding: 32px 8px 24px; }
      .bubble { max-width: 88%; }
      .stats-ribbon { gap: 16px; }
    }
  </style>
</head>
<body>

<!-- animated background -->
<div class="bg-orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="stars" aria-hidden="true" id="stars"></div>

<div class="app">
  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <span class="icon">🎬</span>
      <span>CineAI</span>
    </div>
    <div class="header-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>
    <!-- Hero -->
    <section class="hero">
      <h1>Ask Anything About Movies</h1>
      <p>Powered by a Neo4j graph database and NLP. Ask about directors, actors, ratings, release dates and more.</p>

      <!-- quick-question chips -->
      <div class="chips">
        <button class="chip" onclick="fillQ('Who directed Interstellar?')">🎥 Director</button>
        <button class="chip" onclick="fillQ('Who acted in Titanic?')">🎭 Actors</button>
        <button class="chip" onclick="fillQ('Tell me about Inception')">📖 Overview</button>
        <button class="chip" onclick="fillQ('What is Avatar rating?')">⭐ Rating</button>
        <button class="chip" onclick="fillQ('When was Jurassic Park released?')">📅 Release</button>
        <button class="chip" onclick="fillQ('Show top 10 movies')">🏆 Top 10</button>
        <button class="chip" onclick="fillQ('Which movies are Action?')">🎬 Genre</button>
        <button class="chip" onclick="fillQ('Movies in 2012')">🗓 Year</button>
      </div>
    </section>

    <!-- Stats ribbon -->
    <div class="stats-ribbon">
      <div class="stat"><span class="val" id="stat-q">0</span><span class="lbl">Questions</span></div>
      <div class="stat"><span class="val" id="stat-ok">0</span><span class="lbl">Answered</span></div>
      <div class="stat"><span class="val" id="stat-avg">—</span><span class="lbl">Avg. ms</span></div>
    </div>

    <!-- Chat window -->
    <section id="chat-window" role="log" aria-live="polite" aria-label="Conversation">
      <div class="empty-state" id="empty-state">
        <div class="es-icon">🍿</div>
        <p>Type a question below or pick one of the examples above.<br>I know 5 000+ movies!</p>
      </div>
    </section>
  </main>

  <!-- ── Input bar ── -->
  <div class="input-bar">
    <div class="input-bar-inner">
      <button id="clear-btn" title="Clear chat" aria-label="Clear chat">🗑</button>
      <div class="input-wrap">
        <textarea
          id="question-input"
          placeholder="Ask a movie question…"
          rows="1"
          maxlength="300"
          aria-label="Movie question input"
        ></textarea>
        <span class="char-count" id="char-count">0/300</span>
      </div>
      <button id="send-btn" title="Send" aria-label="Send question">➤</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  /* ── Stars ────────────────────────────────────────────────────────────────── */
  (function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2 + 1;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        --dur:${(Math.random()*4+2).toFixed(1)}s;
        animation-delay:-${(Math.random()*6).toFixed(1)}s;
      `;
      container.appendChild(s);
    }
  })();

  /* ── DOM refs ─────────────────────────────────────────────────────────────── */
  const chatWindow   = document.getElementById('chat-window');
  const emptyState   = document.getElementById('empty-state');
  const input        = document.getElementById('question-input');
  const sendBtn      = document.getElementById('send-btn');
  const clearBtn     = document.getElementById('clear-btn');
  const charCount    = document.getElementById('char-count');
  const toast        = document.getElementById('toast');
  const statusDot    = document.getElementById('status-dot');
  const statusText   = document.getElementById('status-text');
  const statQ        = document.getElementById('stat-q');
  const statOk       = document.getElementById('stat-ok');
  const statAvg      = document.getElementById('stat-avg');

  /* ── Stats ─────────────────────────────────────────────────────────────────── */
  let questions = 0, answered = 0, totalMs = 0;

  function updateStats(ms, ok) {
    questions++;
    if (ok) answered++;
    totalMs += ms;
    statQ.textContent  = questions;
    statOk.textContent = answered;
    statAvg.textContent = Math.round(totalMs / questions) + 'ms';
  }

  /* ── Health check ─────────────────────────────────────────────────────────── */
  async function checkHealth() {
    try {
      const r = await fetch('/health');
      const d = await r.json();
      if (d.neo4j === 'connected') {
        statusDot.className  = 'status-dot';
        statusText.textContent = 'Neo4j connected';
      } else {
        throw new Error(d.neo4j);
      }
    } catch(e) {
      statusDot.className  = 'status-dot error';
      statusText.textContent = 'DB offline';
      showToast('⚠️ Neo4j not reachable. Make sure Neo4j is running.');
    }
  }
  checkHealth();

  /* ── Auto-resize textarea ─────────────────────────────────────────────────── */
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    charCount.textContent = `${input.value.length}/300`;
  });

  /* ── Keyboard shortcut: Enter to send, Shift+Enter for newline ────────────── */
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });

  /* ── Chip fill ───────────────────────────────────────────────────────────── */
  function fillQ(text) {
    input.value = text;
    input.dispatchEvent(new Event('input'));
    input.focus();
  }

  /* ── Toast ───────────────────────────────────────────────────────────────── */
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
  }

  /* ── Time helper ─────────────────────────────────────────────────────────── */
  function nowStr() {
    return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }

  /* ── Append message ──────────────────────────────────────────────────────── */
  function appendMessage(role, text) {
    if (emptyState) emptyState.style.display = 'none';

    const wrap   = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : (role === 'error' ? '⚠️' : '🤖');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.textContent = nowStr();
    bubble.appendChild(ts);

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return wrap;
  }

  /* ── Typing indicator ────────────────────────────────────────────────────── */
  function showTyping() {
    if (emptyState) emptyState.style.display = 'none';
    const wrap   = document.createElement('div');
    wrap.className = 'message bot';
    wrap.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar'; avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }
  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  /* ── Send question ───────────────────────────────────────────────────────── */
  async function sendQuestion() {
    const question = input.value.trim();
    if (!question) { showToast('Please type a question first!'); return; }

    // show user message
    appendMessage('user', question);
    input.value = '';
    input.style.height = 'auto';
    charCount.textContent = '0/300';
    sendBtn.disabled = true;

    showTyping();
    const t0 = Date.now();

    try {
      const res = await fetch('/ask', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({ question })
      });

      hideTyping();
      const ms = Date.now() - t0;

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        appendMessage('error', '⚠️ ' + (err.error || 'Server error'));
        updateStats(ms, false);
      } else {
        const data = await res.json();
        appendMessage('bot', data.answer);
        updateStats(ms, !data.answer.startsWith('❌') && !data.answer.startsWith('⚠️'));
      }

    } catch (err) {
      hideTyping();
      appendMessage('error', '⚠️ Network error. Is the Flask server running?');
      updateStats(Date.now() - t0, false);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', sendQuestion);

  /* ── Clear chat ──────────────────────────────────────────────────────────── */
  clearBtn.addEventListener('click', () => {
    chatWindow.innerHTML = '';
    chatWindow.appendChild(Object.assign(document.createElement('div'), {
      className: 'empty-state',
      id: 'empty-state',
      innerHTML: '<div class="es-icon">🍿</div><p>Chat cleared. Ask me anything!</p>'
    }));
    questions = answered = totalMs = 0;
    statQ.textContent = statOk.textContent = '0';
    statAvg.textContent = '—';
    showToast('Chat cleared 🗑');
  });
</script>
</body>
</html>
